name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-java:
    name: Build Java modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build amodtaxi
        run: cd amodtaxi && mvn clean install -DskipTests

      - name: Build amod
        run: cd amod && mvn clean package -DskipTests

      - name: Run amodtaxi tests
        run: cd amodtaxi && mvn test
        continue-on-error: true

      - name: Run amod tests
        run: cd amod && mvn test
        continue-on-error: true

  lint-python:
    name: Check Python code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_utils/requirements.txt

      - name: Install dependencies
        run: pip install -r data_utils/requirements.txt

      - name: Check syntax
        run: python -m py_compile data_utils/input/attribute_dist.py
